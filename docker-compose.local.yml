# Local testing override — use with:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up
#
# Access:
#   Element:       http://localhost
#   Synapse API:   http://localhost:8008
#   Synapse Admin: http://localhost/synapse-admin/ (legacy: http://localhost:8080 redirects)
#   Element Admin: http://localhost/element-admin/

services:
  nginx:
    volumes:
      - ./nginx/local.conf:/etc/nginx/conf.d/default.conf
      # override: no letsencrypt mount needed
    ports:
      - "80:80"
      - "8008:8008"   # expose synapse directly too
      - "8080:8080"
