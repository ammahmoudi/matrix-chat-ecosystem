# 3. MATRIX SERVER API (matrix.mamood.ir)
server {
    listen 443 ssl;
    server_name matrix.mamood.ir;

    ssl_certificate /etc/letsencrypt/live/matrix.mamood.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/matrix.mamood.ir/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 100M;

    # Use Docker's internal DNS so upstream hostnames resolve dynamically at
    # request time — nginx won't crash at startup if a container isn't up yet
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Well-known — advertise MAS as the OIDC issuer (required by Element X)
    location /.well-known/matrix/client {
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
        return 200 '{"m.homeserver":{"base_url":"https://matrix.mamood.ir"},"org.matrix.msc2965.authentication":{"issuer":"https://auth.mamood.ir/","account":"https://auth.mamood.ir/account"},"default_push_gateway":"https://push.mamood.ir","org.unifiedpush.custom_gateway":"https://push.mamood.ir","m.push":{"base_url":"https://push.mamood.ir"}}';
    }

    location /.well-known/matrix/server {
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
        return 200 '{"m.server":"matrix.mamood.ir:443"}';
    }

    # Legacy /_mas/ path — redirect to new auth subdomain
    location /_mas/ {
        return 301 https://auth.mamood.ir$request_uri;
    }

    # MAS Admin Panel
    location /mas-admin/ {
        set $mas_admin_upstream http://mas-admin:80;
        proxy_pass $mas_admin_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Synapse Admin Panel
    location = /synapse-admin {
        return 301 /synapse-admin/;
    }

    location /synapse-admin/ {
        set $synapse_admin_upstream http://synapse-admin:8080;
        proxy_pass $synapse_admin_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Legacy login/logout/refresh — must be handled by MAS, not Synapse
    location ~ ^/_matrix/client/(v3|r0)/(login|logout|logout/all|refresh) {
        set $mas_upstream http://mas:8090;
        proxy_pass $mas_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        proxy_pass http://synapse:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# 5. MAS AUTH - HTTPS (auth.mamood.ir)
server {
    listen 443 ssl;
    server_name auth.mamood.ir;

    ssl_certificate /etc/letsencrypt/live/auth.mamood.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auth.mamood.ir/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    resolver 127.0.0.11 valid=30s ipv6=off;

    location /api/ {
        set $mas_upstream http://mas:8090;

        # Handle CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "https://matrix.mamood.ir";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            add_header Access-Control-Max-Age 86400;
            return 204;
        }

        proxy_pass $mas_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Headers;
        add_header Access-Control-Allow-Origin "https://matrix.mamood.ir" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    }

    location / {
        set $mas_upstream http://mas:8090;
        proxy_pass $mas_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# CINNY WEB APP - HTTPS (cinny.chat.mamood.ir)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cinny.chat.mamood.ir;

    ssl_certificate /etc/letsencrypt/live/chat.mamood.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.mamood.ir/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Cache static assets; Cinny's internal nginx handles SPA routing
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        proxy_pass http://cinny:80;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://cinny:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# 6. SYNAPSE ADMIN DASHBOARD (legacy: matrix.mamood.ir:8080 → redirects)
server {
    listen 8080;
    server_name matrix.mamood.ir;

    # Legacy port: redirect to the canonical path.
    return 301 https://matrix.mamood.ir/synapse-admin/;
}
