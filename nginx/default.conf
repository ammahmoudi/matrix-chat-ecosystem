# 1. ELEMENT WEB APP - HTTP (chat.mamood.ir)
server {
    listen 80;
    server_name chat.mamood.ir;

    # Hard-intercept the mobile guide redirect
    location /mobile_guide/ {
        return 302 /;
    }

    location /favicon.ico {
        proxy_pass http://element:80/images/logo.png;
    }

    location / {
        proxy_pass http://element:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        add_header Set-Cookie "element_mobile_redirect_to_guide=false; Path=/; Max-Age=31536000";
    }
}

# 2. MATRIX SERVER API - HTTP (matrix.mamood.ir)
server {
    listen 80;
    server_name matrix.mamood.ir;

    client_max_body_size 100M;

    location / {
        proxy_pass http://synapse:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
    }
}

# 3. ELEMENT WEB APP - HTTPS (chat.mamood.ir)
server {
    listen 443 ssl;
    server_name chat.mamood.ir;

    ssl_certificate /etc/letsencrypt/live/chat.mamood.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.mamood.ir/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Hard-intercept the mobile guide redirect
    location /mobile_guide/ {
        return 302 /;
    }

    location /favicon.ico {
        proxy_pass http://element:80/images/logo.png;
    }

    location / {
        proxy_pass http://element:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        add_header Set-Cookie "element_mobile_redirect_to_guide=false; Path=/; Max-Age=31536000";
    }
}

# 3. MATRIX SERVER API (matrix.mamood.ir)
server {
    listen 443 ssl;
    server_name matrix.mamood.ir;

    ssl_certificate /etc/letsencrypt/live/matrix.mamood.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/matrix.mamood.ir/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 100M;

    location / {
        proxy_pass http://synapse:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
