# 1. ELEMENT WEB APP - HTTP (chat.mamood.ir)
server {
    listen 80;
    server_name chat.mamood.ir;

    # Hard-intercept the mobile guide redirect
    location /mobile_guide/ {
        return 302 /;
    }

    location /favicon.ico {
        proxy_pass http://element:80/images/logo.png;
    }

    location / {
        proxy_pass http://element:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        add_header Set-Cookie "element_mobile_redirect_to_guide=false; Path=/; Max-Age=31536000";
    }
}

# 2. MATRIX SERVER API - HTTP (matrix.mamood.ir)
server {
    listen 80;
    server_name matrix.mamood.ir;

    client_max_body_size 100M;

    location /.well-known/matrix/client {
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
        return 200 '{"m.homeserver":{"base_url":"https://matrix.mamood.ir"},"org.matrix.msc2965.authentication":{"issuer":"https://auth.mamood.ir/","account":"https://auth.mamood.ir/account"}}';
    }

    location /.well-known/matrix/server {
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
        return 200 '{"m.server":"matrix.mamood.ir:443"}';
    }

    location / {
        proxy_pass http://synapse:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
    }
}

# 5. MAS AUTH - HTTP (auth.mamood.ir) — redirect to HTTPS
server {
    listen 80;
    server_name auth.mamood.ir;
    return 301 https://$host$request_uri;
}

# 3. ELEMENT WEB APP - HTTPS (chat.mamood.ir)
server {
    listen 443 ssl;
    server_name chat.mamood.ir;

    ssl_certificate /etc/letsencrypt/live/chat.mamood.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.mamood.ir/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Hard-intercept the mobile guide redirect
    location /mobile_guide/ {
        return 302 /;
    }

    location /favicon.ico {
        proxy_pass http://element:80/images/logo.png;
    }

    location / {
        proxy_pass http://element:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        add_header Set-Cookie "element_mobile_redirect_to_guide=false; Path=/; Max-Age=31536000";
    }
}

# 3. MATRIX SERVER API (matrix.mamood.ir)
server {
    listen 443 ssl;
    server_name matrix.mamood.ir;

    ssl_certificate /etc/letsencrypt/live/matrix.mamood.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/matrix.mamood.ir/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 100M;

    # Use Docker's internal DNS so upstream hostnames resolve dynamically at
    # request time — nginx won't crash at startup if a container isn't up yet
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Well-known — advertise MAS as the OIDC issuer (required by Element X)
    location /.well-known/matrix/client {
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
        return 200 '{"m.homeserver":{"base_url":"https://matrix.mamood.ir"},"org.matrix.msc2965.authentication":{"issuer":"https://auth.mamood.ir/","account":"https://auth.mamood.ir/account"}}';
    }

    location /.well-known/matrix/server {
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
        return 200 '{"m.server":"matrix.mamood.ir:443"}';
    }

    # Legacy /_mas/ path — redirect to new auth subdomain
    location /_mas/ {
        return 301 https://auth.mamood.ir$request_uri;
    }

    # Legacy login/logout/refresh — must be handled by MAS, not Synapse
    location ~ ^/_matrix/client/(v3|r0)/(login|logout|logout/all|refresh) {
        set $mas_upstream http://mas:8090;
        proxy_pass $mas_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        proxy_pass http://synapse:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# 5. MAS AUTH - HTTPS (auth.mamood.ir)
server {
    listen 443 ssl;
    server_name auth.mamood.ir;

    ssl_certificate /etc/letsencrypt/live/auth.mamood.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auth.mamood.ir/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    resolver 127.0.0.11 valid=30s ipv6=off;

    location / {
        set $mas_upstream http://mas:8090;
        proxy_pass $mas_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# 6. SYNAPSE ADMIN DASHBOARD (matrix.mamood.ir:8080)
server {
    listen 8080;
    server_name matrix.mamood.ir;

    # MAS Admin Panel
    location /mas-admin/ {
        proxy_pass http://mas-admin:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://synapse-admin:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
