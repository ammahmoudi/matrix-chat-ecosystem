# 1. ELEMENT WEB APP - HTTP (chat.mamood.ir)
server {
    listen 80;
    server_name chat.mamood.ir;

    # Hard-intercept the mobile guide redirect
    location /mobile_guide/ {
        return 302 /;
    }

    location /favicon.ico {
        proxy_pass http://element:80/images/logo.png;
    }

    location / {
        proxy_pass http://element:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        add_header Set-Cookie "element_mobile_redirect_to_guide=false; Path=/; Max-Age=31536000";
        proxy_set_header Accept-Encoding "";
        sub_filter '</head>' '<style>.mx_AuthFooter{display:flex!important;flex-wrap:wrap;justify-content:center;gap:0.4rem;padding:0.5rem 1rem}.mx_AuthFooter a{font-size:0.78rem}</style></head>';
        sub_filter_once on;
    }
}

# CINNY WEB APP - HTTP (cinny.chat.mamood.ir) → redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name cinny.chat.mamood.ir;

    location / {
        return 301 https://$host$request_uri;
    }

    location /.well-known/acme-challenge/ {
        alias /var/lib/letsencrypt/.well-known/acme-challenge/;
    }
}

# 2. MATRIX SERVER API - HTTP (matrix.mamood.ir)
server {
    listen 80;
    server_name matrix.mamood.ir;

    client_max_body_size 100M;

    location /.well-known/matrix/client {
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
        return 200 '{"m.homeserver":{"base_url":"https://matrix.mamood.ir"},"org.matrix.msc2965.authentication":{"issuer":"https://auth.mamood.ir/","account":"https://auth.mamood.ir/account"},"default_push_gateway":"https://push.mamood.ir","org.unifiedpush.custom_gateway":"https://push.mamood.ir","m.push":{"base_url":"https://push.mamood.ir"}}'; 
    }

    location /.well-known/matrix/server {
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
        return 200 '{"m.server":"matrix.mamood.ir:443"}';
    }

    location = /synapse-admin {
        return 301 https://$host/synapse-admin/;
    }

    location /synapse-admin/ {
        return 301 https://$host$request_uri;
    }

    location / {
        proxy_pass http://synapse:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
    }
}

# 5. MAS AUTH - HTTP (auth.mamood.ir) — redirect to HTTPS
server {
    listen 80;
    server_name auth.mamood.ir;
    return 301 https://$host$request_uri;
}

# 7. PUSH (push.mamood.ir) - HTTP redirect to HTTPS
server {
    listen 80;
    server_name push.mamood.ir;
    return 301 https://$host$request_uri;
}

# 8. PUSH (push.mamood.ir) - HTTPS → ntfy
server {
    listen 443 ssl;
    server_name push.mamood.ir;

    ssl_certificate /etc/letsencrypt/live/push.mamood.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/push.mamood.ir/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    resolver 127.0.0.11 valid=30s ipv6=off;

    # ntfy requires these for long-polling and WebSockets
    location / {
        set $ntfy_upstream http://ntfy:80;
        proxy_pass $ntfy_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;   # keep long-poll connections alive
    }
}

