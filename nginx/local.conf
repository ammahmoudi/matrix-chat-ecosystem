# Local HTTP-only nginx config (no SSL, no domain names)
# Element:       http://localhost
# Matrix API:    http://localhost/matrix/ (proxied) or http://localhost:8008 directly
# Synapse Admin: http://localhost:8080

server {
    listen 80;
    server_name localhost;

    # Element web app
    location / {
        proxy_pass http://element:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
    }

    # Synapse matrix API (so Element can reach it on same origin)
    location /_matrix/ {
        proxy_pass http://synapse:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        client_max_body_size 100M;
    }

    location /_synapse/ {
        proxy_pass http://synapse:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
    }
}

# Synapse Admin
server {
    listen 8080;
    server_name localhost;

    location / {
        proxy_pass http://synapse-admin:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
