<style type="text/css">
    .mx_custom_wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
        min-height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #f8fafc;
        box-sizing: border-box;
    }

    .mx_custom_logo {
        width: 56px;
        height: 56px;
        margin-bottom: 1.1rem;
    }

    .mx_custom_title {
        font-size: 1.65rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin: 0 0 0.35rem;
        color: #f8fafc;
    }

    .mx_custom_tagline {
        font-size: 0.83rem;
        color: rgba(255,255,255,0.4);
        margin: 0 0 2rem;
        line-height: 1.5;
    }

    .mx_custom_actions {
        display: flex;
        flex-direction: column;
        gap: 0.65rem;
        width: 100%;
        max-width: 260px;
    }

    .mx_custom_btn {
        display: block;
        padding: 0.78rem 1.5rem;
        border-radius: 10px;
        font-size: 0.88rem;
        font-weight: 600;
        text-decoration: none;
        transition: opacity 0.15s, transform 0.1s;
        box-sizing: border-box;
    }

    .mx_custom_btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .mx_custom_btn:active { transform: translateY(0); }

    .mx_custom_btn_primary {
        background: #0ea5e9;
        color: #fff !important;
    }

    .mx_custom_btn_secondary {
        background: rgba(255,255,255,0.07);
        color: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(255,255,255,0.1);
    }
</style>

<div class="mx_custom_wrap">
    <img class="mx_custom_logo" src="/images/logo.svg" alt="" onerror="this.style.display='none'">
    <h1 class="mx_custom_title">Mamoox</h1>
    <p class="mx_custom_tagline">Private &amp; encrypted messaging</p>

    <div class="mx_custom_actions">
        <a class="mx_custom_btn mx_custom_btn_primary" href="#/login">Sign In</a>
        <a class="mx_custom_btn mx_custom_btn_secondary" href="#/register">Create Account</a>
    </div>
</div>
