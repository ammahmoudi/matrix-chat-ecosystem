services:
  postgres:
    image: postgres:15-alpine
    container_name: mamood-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U client -d matrix"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - matrix-net

  mas:
    image: ghcr.io/element-hq/matrix-authentication-service:latest
    container_name: mamood-mas
    restart: unless-stopped
    command: server
    environment:
      - MAS_CONFIG=/config/config.yaml
    volumes:
      - ./mas/config.yaml:/config/config.yaml
      - ./synapse/homeserver.yaml:/synapse/homeserver.yaml:ro
      - mas-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - matrix-net

  synapse:
    image: matrixdotorg/synapse:latest
    container_name: mamood-synapse
    restart: unless-stopped
    environment:
      - SYNAPSE_CONFIG_PATH=/config/homeserver.yaml
    extra_hosts:
      - "${PUSH_DOMAIN:-push.example.com}:host-gateway"  # allows Synapse to reach nginx→ntfy on the host
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:8008/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    volumes:
      - ./synapse-data:/data
      - ./synapse/homeserver.yaml:/config/homeserver.yaml
      - ./synapse/synapse.log.config:/config/synapse.log.config
    networks:
      - matrix-net

  element:
    image: vectorim/element-web:latest
    container_name: mamood-element
    restart: unless-stopped
    volumes:
      - ./element/config.json:/app/config.json
      - ./element/welcome.html:/app/welcome.html
      - ./element/home.html:/app/home.html
      - ./element/images:/app/images
      - ./element/images/logo.png:/app/favicon.ico
    networks:
      - matrix-net

  # synapse-admin (legacy upstream):
  #   image: awesometechnologies/synapse-admin:latest
  #   container_name: mamood-admin
  #   restart: unless-stopped
  #   networks:
  #     - matrix-net

  # synapse-admin (etkecc fork): served via nginx at https://matrix.example.com/synapse-admin/
  synapse-admin:
    image: etkecc/synapse-admin:latest
    container_name: mamood-admin
    restart: unless-stopped
    volumes:
      - ./synapse-admin/config.json:/var/public/config.json:ro
    networks:
      - matrix-net

  # Element Admin: served via nginx at https://matrix.example.com/element-admin/
  element-admin:
    image: oci.element.io/element-admin:latest
    container_name: mamood-element-admin
    restart: unless-stopped
    networks:
      - matrix-net

  ntfy:
    image: binwiederhier/ntfy
    container_name: mamood-ntfy
    restart: unless-stopped
    command: serve
    environment:
      - TZ=Asia/Tehran
    volumes:
      - ./ntfy/server.yml:/etc/ntfy/server.yml
      - ntfy-cache:/var/cache/ntfy
      - ntfy-data:/var/lib/ntfy
    networks:
      - matrix-net

  cinny:
    # image: ajbura/cinny:latest
    image: amahmoudi/cinny-mamood:latest
    container_name: mamood-cinny
    restart: unless-stopped
    volumes:
      - ./cinny/config.json:/app/config.json
    networks:
      - matrix-net

  fluffychat-web:
    image: amahmoudi/fluffychat-web:latest
    container_name: mamood-fluffychat
    restart: unless-stopped
    volumes:
      - ./fluffychat/config.json:/config/config.json:ro
    networks:
      - matrix-net

  mas-admin:
    image: amahmoudi/mas-admin:latest
    container_name: mamood-mas-admin
    restart: unless-stopped
    environment:
      - MAS_ADMIN_MAS_BASE_URL=${MAS_ADMIN_MAS_BASE_URL:-https://auth.example.com}
      - MAS_ADMIN_CLIENT_ID=${MAS_ADMIN_CLIENT_ID:-00000000000000000000000007}
      - MAS_ADMIN_REDIRECT_BASE=${MAS_ADMIN_REDIRECT_BASE:-https://matrix.example.com}
      - MAS_ADMIN_CHAT_BASE_URL=${MAS_ADMIN_CHAT_BASE_URL:-https://chat.example.com}
    networks:
      - matrix-net

  # ---------------------------------------------------------------------------
  # VOICE & VIDEO CALLS
  # ---------------------------------------------------------------------------

  # LiveKit SFU — real-time media server for MatrixRTC group calls
  livekit:
    image: livekit/livekit-server:latest
    container_name: mamood-livekit
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    ports:
      # WebSocket signalling (nginx terminates TLS and proxies here)
      - "7880:7880"
      # RTC TCP fallback
      - "7881:7881"
      # RTC UDP media — keep these open in your firewall
      - "50100-50200:50100-50200/udp"
    volumes:
      - ./livekit/livekit.yaml:/etc/livekit.yaml:ro
    networks:
      - matrix-net

  # lk-jwt-service — mints short-lived LiveKit JWTs for authenticated Matrix users
  livekit-jwt:
    image: ghcr.io/element-hq/lk-jwt-service:latest
    container_name: mamood-livekit-jwt
    restart: unless-stopped
    environment:
      - LIVEKIT_JWT_PORT=8080
      - LIVEKIT_URL=wss://call.chat.mamood.ir/livekit/sfu
      - LIVEKIT_KEY=${LIVEKIT_KEY:-mamood}
      - LIVEKIT_SECRET=${LIVEKIT_SECRET:?LIVEKIT_SECRET is required}
      # Allow all homeservers on this install (restrict with a comma-separated list if needed)
      - LIVEKIT_FULL_ACCESS_HOMESERVERS=matrix.mamood.ir
    depends_on:
      - livekit
    networks:
      - matrix-net

  # Element Call SPA — the in-browser video/voice call UI
  element-call:
    image: ghcr.io/element-hq/element-call:latest
    container_name: mamood-element-call
    restart: unless-stopped
    volumes:
      - ./element-call/config.json:/app/config/config.json:ro
    networks:
      - matrix-net

  # coturn TURN server — relays UDP/TCP media for users behind strict NAT
  # Uses host networking so TURN port-mapping works correctly.
  coturn:
    image: coturn/coturn:latest
    container_name: mamood-coturn
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
      - /etc/letsencrypt/live/matrix.mamood.ir/fullchain.pem:/etc/ssl/turn/fullchain.pem:ro
      - /etc/letsencrypt/live/matrix.mamood.ir/privkey.pem:/etc/ssl/turn/privkey.pem:ro
    environment:
      - TURN_SECRET=${TURN_SECRET:?TURN_SECRET is required}
    command: >
      -c /etc/coturn/turnserver.conf
      --static-auth-secret=${TURN_SECRET}

  nginx:
    image: nginx:latest
    container_name: mamood-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"    # legacy Synapse Admin port (now redirects)
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt
    depends_on:
      synapse:
        condition: service_healthy
      element:
        condition: service_started
      synapse-admin:
        condition: service_started
      element-admin:
        condition: service_started
      mas-admin:
        condition: service_started
      cinny:
        condition: service_started
      fluffychat-web:
        condition: service_started
      ntfy:
        condition: service_started
      element-call:
        condition: service_started
      livekit-jwt:
        condition: service_started
    networks:
      - matrix-net

networks:
  matrix-net:
    driver: bridge

volumes:
  postgres-data:
  mas-data:
  ntfy-cache:
  ntfy-data:
