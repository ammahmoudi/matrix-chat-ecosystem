services:
  postgres:
    image: postgres:15-alpine
    container_name: mamood-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=client
      - POSTGRES_PASSWORD=REDACTED
      - POSTGRES_DB=matrix
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U client -d matrix"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - matrix-net

  mas:
    image: ghcr.io/element-hq/matrix-authentication-service:latest
    container_name: mamood-mas
    restart: unless-stopped
    command: server
    environment:
      - MAS_CONFIG=/config/config.yaml
    volumes:
      - ./mas/config.yaml:/config/config.yaml
      - ./synapse/homeserver.yaml:/synapse/homeserver.yaml:ro
      - mas-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - matrix-net

  synapse:
    image: matrixdotorg/synapse:latest
    container_name: mamood-synapse
    restart: unless-stopped
    environment:
      - SYNAPSE_CONFIG_PATH=/config/homeserver.yaml
    extra_hosts:
      - "push.mamood.ir:host-gateway"  # allows Synapse to reach nginx→ntfy on the host
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:8008/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    volumes:
      - ./synapse-data:/data
      - ./synapse/homeserver.yaml:/config/homeserver.yaml
      - ./synapse/synapse.log.config:/config/synapse.log.config
    networks:
      - matrix-net

  element:
    image: vectorim/element-web:latest
    container_name: mamood-element
    restart: unless-stopped
    volumes:
      - ./element/config.json:/app/config.json
      - ./element/welcome.html:/app/welcome.html
      - ./element/home.html:/app/home.html
      - ./element/images:/app/images
      - ./element/images/logo.png:/app/favicon.ico
    networks:
      - matrix-net

  synapse-admin:
    image: awesometechnologies/synapse-admin:latest
    container_name: mamood-admin
    restart: unless-stopped
    networks:
      - matrix-net

  ntfy:
    image: binwiederhier/ntfy
    container_name: mamood-ntfy
    restart: unless-stopped
    command: serve
    environment:
      - TZ=Asia/Tehran
    volumes:
      - ./ntfy/server.yml:/etc/ntfy/server.yml
      - ntfy-cache:/var/cache/ntfy
      - ntfy-data:/var/lib/ntfy
    networks:
      - matrix-net

  cinny:
    image: ajbura/cinny:latest
    container_name: mamood-cinny
    restart: unless-stopped
    volumes:
      - ./cinny/config.json:/app/config.json
    networks:
      - matrix-net

  mas-admin:
    build:
      context: ./mas-admin
      args:
        VITE_MAS_BASE_URL: ${VITE_MAS_BASE_URL:-https://auth.mamood.ir}
        VITE_CLIENT_ID: ${VITE_CLIENT_ID:-00000000000000000000000007}
        VITE_REDIRECT_BASE: ${VITE_REDIRECT_BASE:-https://matrix.mamood.ir}
        VITE_CHAT_BASE_URL: ${VITE_CHAT_BASE_URL:-https://chat.mamood.ir}
    container_name: mamood-mas-admin
    restart: unless-stopped
    networks:
      - matrix-net

  nginx:
    image: nginx:latest
    container_name: mamood-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"    # Synapse Admin
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt
    depends_on:
      synapse:
        condition: service_healthy
      element:
        condition: service_started
      synapse-admin:
        condition: service_started
      mas-admin:
        condition: service_started
      cinny:
        condition: service_started
      ntfy:
        condition: service_started
    networks:
      - matrix-net

networks:
  matrix-net:
    driver: bridge

volumes:
  postgres-data:
  mas-data:
  ntfy-cache:
  ntfy-data:
